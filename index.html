<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adi — Noodle spill</title>
  <meta name="description" content="A stream of essays and thoughts by Adi." />
  <style>
    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─── Curve-inspired colour palette ─────────────────────────
       Pulled directly from Curve Finance's UI:
         --bg-desktop   : the muted purple-periwinkle desktop
         --blue-title   : the rich cobalt blue of the Curve logo bar
         --green-accent : the green used on filter tabs & CTA buttons
         --orange-accent: the orange used on FACTORY badges
    ──────────────────────────────────────────────────────────── */
    :root {
      --bg-desktop:    #8686B8;   /* Curve's purple-grey desktop */
      --blue-title:    #1A5FB4;   /* Curve logo cobalt blue      */
      --blue-dark:     #0D3D7A;   /* deeper blue for hover/depth */
      --green-accent:  #2E8B3A;   /* Curve's filter-tab green    */
      --green-light:   #3DAA4A;   /* lighter green for hover     */
      --orange-accent: #D4620A;   /* Curve's FACTORY orange      */
      --orange-light:  #E8731B;   /* lighter orange for hover    */
      --win-grey:      #C0C0C0;   /* classic Windows button grey */
      --win-light:     #FFFFFF;   /* raised border light edge    */
      --win-dark:      #606060;   /* raised border dark edge     */
      --win-shadow:    #808080;   /* mid-grey for inset borders  */
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg-desktop);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 32px;
    }

    /* ─── Window Shell ────────────────────────────────────────── */
    .window {
      width: 100%;
      max-width: 900px;
      background: var(--win-grey);
      border: 2px solid;
      border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light);
      box-shadow: 4px 4px 0 #000000;
    }

    /* ─── Title Bar ───────────────────────────────────────────── */
    /* Uses Curve's cobalt blue instead of the default Windows navy */
    .title-bar {
      background: var(--blue-title);
      color: #FFFFFF;
      padding: 4px 8px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      cursor: default;
    }

    .title-bar-text {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: calc(100% - 70px);
    }

    .win-controls {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .win-btn {
      background: var(--win-grey);
      border: 2px solid;
      border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light);
      width: 18px;
      height: 16px;
      font-size: 9px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      line-height: 1;
    }

    .win-btn:active {
      border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
    }

    /* ─── Menu Bar ────────────────────────────────────────────── */
    /* The green tabs mirror Curve's "All / USD / BTC / ETH" filter row */
    .menu-bar {
      background: var(--win-grey);
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--win-shadow);
      padding: 1px 2px 0;
      gap: 2px;
    }

    .menu-item {
      padding: 3px 12px;
      font-size: 12px;
      font-family: 'Courier New', Courier, monospace;
      cursor: pointer;
      color: #000000;
      user-select: none;
      white-space: nowrap;
    }

    /* Default hover uses the Curve green — mirrors the filter tabs */
    .menu-item:hover {
      background: var(--green-accent);
      color: #FFFFFF;
    }

    /* The "active" current-section item uses the blue title colour */
    .menu-item.active {
      background: var(--blue-title);
      color: #FFFFFF;
    }

    /* ─── Content Area ────────────────────────────────────────── */
    .content-area {
      background: #FFFFFF;
      border: 2px solid;
      border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
      margin: 4px;
      overflow: hidden;
    }

    /* ─── Stream View ─────────────────────────────────────────── */
    .stream-view {
      height: 540px;
      overflow-y: scroll;
      padding: 32px 40px;
    }

    .stream-view::-webkit-scrollbar        { width: 17px; }
    .stream-view::-webkit-scrollbar-track  { background: var(--win-grey); border-left: 1px solid var(--win-shadow); }
    .stream-view::-webkit-scrollbar-thumb  { background: var(--win-grey); border: 2px solid; border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light); }
    .stream-view::-webkit-scrollbar-button { background: var(--win-grey); border: 2px solid; border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light); height: 17px; display: block; }

    /* ─── Post Entries ────────────────────────────────────────── */
    .entry {
      cursor: pointer;
      padding: 4px 0;
      display: block;
      text-decoration: none;
    }

    /* On hover, the title highlights in Curve blue */
    .entry:hover .entry-title {
      background: var(--blue-title);
      color: #FFFFFF;
    }

    .entry-date {
      font-size: 10px;
      color: #888888;
      letter-spacing: 1.5px;
      display: block;
      margin-bottom: 3px;
      text-transform: uppercase;
    }

    .entry-title {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #000000;
      line-height: 1.25;
      display: inline;
    }

    .entry.big   .entry-title { font-size: 21px; }
    .entry.med   .entry-title { font-size: 15px; }
    .entry.small .entry-title { font-size: 13px; }

    .entry-excerpt {
      font-size: 11px;
      color: #555555;
      font-style: italic;
      display: block;
      margin-top: 5px;
      padding-left: 2px;
      line-height: 1.55;
    }

    /* ─── Fragments / Quotes ──────────────────────────────────── */
    /* The left border uses Curve orange — a nod to the FACTORY badge colour */
    .fragment {
      font-size: 12px;
      color: #444444;
      font-style: italic;
      padding: 6px 0 6px 18px;
      border-left: 3px solid var(--orange-accent);
      display: block;
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.6;
      cursor: default;
    }

    .divider {
      border: none;
      border-top: 1px dashed #DDDDDD;
      margin: 20px 0;
    }

    .gap-sm { height: 10px; }
    .gap-md { height: 22px; }
    .gap-lg { height: 38px; }

    /* ─── Reader View ─────────────────────────────────────────── */
    .reader-view {
      height: 540px;
      overflow-y: auto;
      padding: 36px 44px;
      display: none;
    }

    .reader-view::-webkit-scrollbar        { width: 17px; }
    .reader-view::-webkit-scrollbar-track  { background: var(--win-grey); border-left: 1px solid var(--win-shadow); }
    .reader-view::-webkit-scrollbar-thumb  { background: var(--win-grey); border: 2px solid; border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light); }

    .reader-title {
      font-size: 19px;
      font-weight: bold;
      line-height: 1.3;
      margin-bottom: 6px;
      /* Underline uses Curve green instead of plain black */
      border-bottom: 2px solid var(--green-accent);
      padding-bottom: 10px;
      color: #000000;
    }

    .reader-meta {
      font-size: 10px;
      color: #888888;
      letter-spacing: 1.5px;
      display: block;
      margin-bottom: 28px;
      text-transform: uppercase;
    }

    /* ── Body content renderers ───────────────────────────────── */

    .reader-body p {
      font-size: 13px;
      line-height: 1.9;
      margin-bottom: 18px;
      color: #111111;
    }

    /* Section headings — blue left bar, Curve-style */
    .reader-body .section-heading {
      font-size: 13px;
      font-weight: bold;
      color: #000000;
      margin: 28px 0 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-left: 3px solid var(--blue-title);
      padding-left: 8px;
    }

    .reader-body .body-divider {
      border: none;
      border-top: 1px dashed #CCCCCC;
      margin: 24px 0;
    }

    /* Image block — full-width, retro sunken border */
    .reader-body .body-image {
      margin: 24px 0;
    }

    .reader-body .body-image img {
      width: 100%;
      max-width: 100%;
      display: block;
      border: 2px solid;
      border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
    }

    .reader-body .body-image .img-caption {
      font-size: 10px;
      color: #666666;
      font-style: italic;
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* Video block — responsive 16:9 wrapper.
       The padding-top trick creates a zero-height box that expands
       to exactly 16:9. The iframe/video is then absolutely
       positioned to fill it — this is the correct way to handle
       responsive embeds without JS. */
    .reader-body .body-video {
      margin: 24px 0;
    }

    .reader-body .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border: 2px solid;
      border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
    }

    .reader-body .video-wrapper iframe,
    .reader-body .video-wrapper video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .reader-body .body-video .vid-caption {
      font-size: 10px;
      color: #666666;
      font-style: italic;
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-align: center;
    }

    /* Blockquote — orange left border, echoing the FACTORY badge */
    .reader-body blockquote {
      border-left: 3px solid var(--orange-accent);
      margin: 20px 0;
      padding: 4px 0 4px 16px;
      font-style: italic;
      color: #444444;
      font-size: 13px;
      line-height: 1.7;
    }

    /* Disclaimer box — green border, echoing the Curve "Connect wallet" banner */
    .reader-body .disclaimer {
      border: 1px solid var(--green-accent);
      background: #F0FFF4;
      padding: 8px 12px;
      font-size: 11px;
      color: #2A5E30;
      font-style: italic;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* ─── Status Bar ──────────────────────────────────────────── */
    .status-bar {
      background: var(--win-grey);
      border-top: 1px solid var(--win-shadow);
      padding: 2px 6px;
      font-size: 11px;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .status-panel {
      border: 1px solid;
      border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
      padding: 1px 8px;
      white-space: nowrap;
    }

    /* Clock uses orange — mirrors the Curve FACTORY badge colour */
    #status-clock {
      color: var(--orange-accent);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="window">

    <!-- ── Title Bar ─────────────────────────────────────────── -->
    <div class="title-bar">
      <span class="title-bar-text" id="title-bar-text">
        ADI.EXE &nbsp;—&nbsp; Writings &amp; Thoughts &nbsp;[v1.0]
      </span>
      <div class="win-controls">
        <button class="win-btn" title="Minimize">_</button>
        <button class="win-btn" title="Maximize">&#9633;</button>
        <button class="win-btn" title="Close">&#215;</button>
      </div>
    </div>

    <!-- ── Menu Bar ──────────────────────────────────────────── -->
    <div class="menu-bar">
      <div class="menu-item active" id="menu-all"  onclick="showStream()">All Posts</div>
      <div class="menu-item"        id="menu-back" onclick="showStream()" style="display:none">&#8592; Back</div>
      <div class="menu-item">Sort By Date</div>
      <div class="menu-item">Filter</div>
      <div class="menu-item" onclick="showAbout()">About.txt</div>
    </div>

    <!-- ── Content Area ──────────────────────────────────────── -->
    <div class="content-area">
      <div class="stream-view" id="stream-view"></div>
      <div class="reader-view" id="reader-view"></div>
    </div>

    <!-- ── Status Bar ─────────────────────────────────────────── -->
    <div class="status-bar">
      <span class="status-panel" id="status-count">— entries</span>
      <span class="status-panel" id="status-mode">scroll to read</span>
      <span class="status-panel" id="status-clock"></span>
    </div>

  </div>

  <script>
    /*
    ════════════════════════════════════════════════════════════════
      POSTS ARRAY
      ───────────
      Each post is an object. The "body" field is an array of
      content blocks. Each block is either:

        A plain string  →  rendered as a <p> paragraph.

        Or an object with a "type" field:

        { type: "heading",   text: "Section title" }
          Renders a bold uppercase section heading with a blue bar.

        { type: "divider" }
          Renders a dashed horizontal rule.

        { type: "quote",   text: "Pull quote" }
          Renders an orange-bordered blockquote.

        { type: "disclaimer", text: "Small print" }
          Renders a green-bordered disclaimer box.

        { type: "image", src: "https://...", caption: "Optional" }
          Full-width image. Host images in your GitHub repo under
          an /images folder (src: "./images/photo.jpg") or use any
          public image URL.

        { type: "video",
          src: "https://www.youtube.com/embed/VIDEO_ID",
          caption: "Optional",
          isEmbed: true }
          For YouTube, set isEmbed: true and use the /embed/ URL.
          For self-hosted .mp4, set isEmbed: false and give the
          direct file path (e.g. src: "./videos/clip.mp4").

    ════════════════════════════════════════════════════════════════
    */
    const posts = [
      {
        id:      "stages-of-tech-grief",
        size:    "big",
        title:   "Stages of Tech Grief: How New Technologies Emerge",
        date:    "MAR 2023",
        excerpt: "Why does it take decades for obviously better things to win?",
        body: [

          { type: "disclaimer", text: "The content below is not an original thought. Rather, an extension of Elting E. Morison’s work in <em>Men, Machines, and Modern Times.</em>" },

          "Since the beginning of mankind, new technologies have disrupted old ones. Subsistence farming replaced hunting and gathering. Cars replaced horse carriages. Electricity replaced lamps. Personal computers replaced mainframes. The pattern is recurring and obvious.",

          "What's less obvious is why it always takes so long for disruptions to materialize.",

          "Despite being clearly superior to whatever came before, new technologies are almost never adopted quickly. The gap between introduction and widespread use tends to be take decades rather than years. I've thought about this a fair bit, and recently came across a book that offered the clearest explanation I've found: Men, Machines, and Modern Times by Elting E. Morison. In it, Morison traces this phenomenon through a case study from 19th-century naval warfare that is almost comically instructive.",

          { type: "heading", text: "Naval warfare in the 19th century" },

          "The guns mounted on US Navy ships in the 1800s were painfully inaccurate. Because the guns were fitted directly to the hull, as the ship rolled with the sea, the gunman's ability to aim was at the mercy of the ocean. He could adjust the gun's vertical angle, but had to fire well before the target was properly in sight, whilst hoping the ship's movement and the shot's trajectory would converge at the right moment. More often than not, they didn't.",

          { type: "image", src: "./image/uss_indiana.jpg", caption: "USS Indiana in the early 20th century."},

          "And the scope made things worse. Mounted directly on the gun barrel, it was practically unusable in combat whereby the recoil from firing would drive it straight into the gunman's eye (ouch).",

          { type: "quote", text: "19th-century naval warfare was more painful art than science." },

          "Then a young officer named William S. Sims arrived at the scene and made two changes. First, he redesigned the gun mechanism so it auto-corrected for the ship's movement. If the ship rolled upward as the gunman took aim, the barrel lowered accordingly, and vice versa. Second, he mounted the scope on a sleeve around the barrel rather than on the barrel itself, meaning the gun could recoil freely without moving the sight.",

          "As a result accuracy improved by 3,000%. More significantly, the changes made continuous-aim firing possible — the ability to keep a weapon trained on a moving target while firing multiple shots in succession, something previously considered mathematically impossible on a ship at sea.",

          "Sims documented everything and submitted his findings to the Bureau of Navigation and the Bureau of Ordnance.",

          "And both institutions ignored him completely.",

          { type: "heading", text: "The three stages" },

          "What followed became the template.",

          "Stage one: ignore. Not a single officer responded to Sims' reports. His data sat unread.",

          "Stage two: rational counterarguments. As word spread through the fleet, the Bureau of Navigation was eventually forced to respond. The Chief replied by saying the problem wasn't the guns, it was the officers operating them. More training was needed. Continuous-aim firing, he added, was impossible, even with five men on a single gun.",

          "Stage three: name-calling. When a handful of US and UK warships began adopting Sims' methods and the results proved undeniable, the rational arguments disappeared. Sims was dismissed as a liar and a \"crackbrained egotist.\"",

          "He eventually went over everyone's heads and appealed directly to President Theodore Roosevelt. In 1908 — a full decade after his innovations were first demonstrated — the new gunnery was implemented across the entire US Navy.",

          { type: "heading", text: "Why the lag exists" },

          "The Sims case is a near perfect example of how new technologies are received, but it doesn't immediately explain why the pattern is so consistent. The answer has less to do with logic than with identity.",

          "New technologies don't just replace old tools. They disrupt the power structures, hierarchies, habits, and self-conceptions that have formed around those tools. The US Navy wasn't simply a collection of ships and weapons — it was a society. Officers had built careers, reputations, and daily routines around mastering the existing system. When Sims introduced better guns, he wasn't just offering an upgrade. He was implicitly telling everyone who had dedicated their professional lives to the old system that what they knew was obsolete.",

          "And humans respond to existential threats the same way regardless of the century: first by looking away, then by constructing reasons why the threat isn't real (aka denial), and finally — when the evidence becomes undeniable — by attacking the messenger.",

          "The same pattern has played out with every major technology in history (calculators, bicycles, modern day internet, social networks), and it's playing out right now with AI. Its currently in the name-calling stage, which, if the historical pattern holds, is actually a reliable signal of imminent adoption.",

          "The stages are predictable. What's less predictable is how long each one lasts, and whether the people on the right side of history have the patience, and the stubbornness, to wait it out.",

          { type: "divider" }
        ]
      }
    ];

    /*
    ════════════════════════════════════════════════════════════════
      FRAGMENTS
      ─────────
      Italic quotes scattered between posts in the stream.
      Purely decorative — they don't link anywhere.
    ════════════════════════════════════════════════════════════════
    */
    const fragments = [
    "Microinteractions",
    ];

    /*
    ════════════════════════════════════════════════════════════════
      ABOUT TEXT
      ──────────
      Shown when "About.txt" is clicked in the menu bar.
    ════════════════════════════════════════════════════════════════
    */
    const aboutText = [
      "I'm Adi. I work as a Senior Data Analyst at Moss",
      "I love to write in my spare time."
    ];

    /* ── Body block renderer ───────────────────────────────────────
       Converts a single body block (string or object) into HTML.
       This is the only function you need to touch if you want to
       add a new block type in the future.
    ──────────────────────────────────────────────────────────────── */
    function renderBlock(block) {
      if (typeof block === "string") {
        return `<p>${block}</p>`;
      }
      switch (block.type) {
        case "heading":
          return `<div class="section-heading">${block.text}</div>`;
        case "divider":
          return `<hr class="body-divider">`;
        case "quote":
          return `<blockquote>${block.text}</blockquote>`;
        case "disclaimer":
          return `<div class="disclaimer">${block.text}</div>`;
        case "image":
          return `
            <div class="body-image">
              <img src="${block.src}" alt="${block.caption || ''}" loading="lazy" />
              ${block.caption ? `<div class="img-caption">${block.caption}</div>` : ''}
            </div>`;
        case "video":
          const el = block.isEmbed
            ? `<iframe src="${block.src}" allowfullscreen title="${block.caption || 'video'}"></iframe>`
            : `<video src="${block.src}" controls></video>`;
          return `
            <div class="body-video">
              <div class="video-wrapper">${el}</div>
              ${block.caption ? `<div class="vid-caption">${block.caption}</div>` : ''}
            </div>`;
        default:
          return "";
      }
    }

    /* ── Stream builder ─────────────────────────────────────────── */
    function buildStream() {
      const sv = document.getElementById("stream-view");
      let html = "";
      html += `<div class="gap-lg"></div>`;
      html += entryHTML(posts[0]);
      html += `<div class="gap-lg"></div>`;
      html += `<span class="fragment">"${fragments[0]}"</span>`;
      sv.innerHTML = html;
    }

    function entryHTML(post) {
      const excerpt = post.excerpt
        ? `<span class="entry-excerpt">${post.excerpt}</span>`
        : "";
      return `
        <div class="entry ${post.size}" onclick="openPost('${post.id}')">
          <span class="entry-date">${post.date}</span>
          <span class="entry-title">${post.title}</span>
          ${excerpt}
        </div>`;
    }

    /* ── Navigation ─────────────────────────────────────────────── */
    function openPost(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;
      const shortTitle = post.title.length > 55
        ? post.title.substring(0, 55) + "…"
        : post.title;
      document.getElementById("title-bar-text").textContent = shortTitle;
      document.getElementById("reader-view").innerHTML = `
        <h2 class="reader-title">${post.title}</h2>
        <span class="reader-meta">${post.date}</span>
        <div class="reader-body">${post.body.map(renderBlock).join("")}</div>`;
      switchToReader("reading: " + post.date);
    }

    function showAbout() {
      document.getElementById("title-bar-text").textContent = "About.txt";
      document.getElementById("reader-view").innerHTML = `
        <h2 class="reader-title">About.txt</h2>
        <span class="reader-meta"></span>
        <div class="reader-body">${aboutText.map(p => `<p>${p}</p>`).join("")}</div>`;
      switchToReader("about.txt");
    }

    function switchToReader(statusText) {
      document.getElementById("stream-view").style.display = "none";
      document.getElementById("reader-view").style.display = "block";
      document.getElementById("menu-all").style.display    = "none";
      document.getElementById("menu-back").style.display   = "";
      document.getElementById("status-mode").textContent   = statusText;
      document.getElementById("reader-view").scrollTop     = 0;
      document.getElementById("menu-back").className       = "menu-item active";
    }

    function showStream() {
      document.getElementById("title-bar-text").innerHTML  = "ADI.EXE &nbsp;—&nbsp; Writings &amp; Thoughts &nbsp;[v1.0]";
      document.getElementById("stream-view").style.display = "";
      document.getElementById("reader-view").style.display = "none";
      document.getElementById("menu-all").style.display    = "";
      document.getElementById("menu-back").style.display   = "none";
      document.getElementById("status-mode").textContent   = "scroll to read";
      document.getElementById("menu-all").className        = "menu-item active";
    }

    /* ── Status bar clock ──────────────────────────────────────── */
    function updateClock() {
      const d      = new Date();
      const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
      const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
      const hh     = String(d.getHours()).padStart(2, "0");
      const mm     = String(d.getMinutes()).padStart(2, "0");
      document.getElementById("status-clock").textContent =
        `${days[d.getDay()]} ${months[d.getMonth()]} ${String(d.getDate()).padStart(2,"0")} ${hh}:${mm}`;
    }

    /* ── Init ─────────────────────────────────────────────────── */
    document.getElementById("status-count").textContent =
      posts.length + " entr" + (posts.length === 1 ? "y" : "ies");
    buildStream();
    updateClock();
    setInterval(updateClock, 30000);
  </script>

</body>
</html>
